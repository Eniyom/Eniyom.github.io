<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Controller</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/styles.min.css">
</head>
<style>
  body {
    overflow-x: hidden;
  }
  #jumpscare {position: absolute; top: 0px; left: 0px; width: 100%; height: 100%; cursor: pointer; visibility: hidden;}
</style>
<body>
    <img id="jumpscare" src="./g.gif"/>
    <audio id="scream" src="./jumpscareAudio.mp3"/>
    <div class="highlight-clean">
        <div class="container">
            <div class="intro">
                <h2 class="text-center">12 Say-8 Ders Portalı</h2>
                <p class="text-center">&nbsp;İstediğin derse katılmak için tek yapman gereken derse tıklamak!</p>
            </div>
            <div class="buttons"></div>
        </div>
    </div>
    <div class="container"><button class="btn btn-primary" id="tr" type="button">Türkçe</button><button class="btn btn-primary" id="m1" type="button">Mat1</button><button class="btn btn-primary" id="m2" type="button">Mat2</button><button class="btn btn-primary" id="k1" type="button">Kim1</button>
        <button
            class="btn btn-primary" id="k2" type="button">Kim2</button><button class="btn btn-primary" id="f1" type="button">Fiz1</button><button class="btn btn-primary" id="f2" type="button">Fiz2</button><button class="btn btn-primary" id="c" type="button">Coğrafya</button><button class="btn btn-primary"
                id="tar" type="button">Tarih</button><button class="btn btn-primary" id="fel" type="button">Felsefe</button><button class="btn btn-primary" id="geo1" type="button">Geo1</button><button class="btn btn-primary" id="geo2" type="button">Geo2</button>
            <button class="btn btn-primary" id="biy1." onclick="jumpscare();" type="button">Biy1</button><button class="btn btn-primary" id="biy2" type="button">Biy2</button></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.3.1/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/script.min.js"></script>
    <script>
        function jumpscare() {
        var jumpscare = document.getElementById("jumpscare");
        jumpscare.style.visibility="visible";
        var audio = document.getElementById("scream");
          audio.play();
        }
    </script>
</body>

</html>
